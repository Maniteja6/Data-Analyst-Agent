name: Deploy — Production

# Triggers on semver tags (v1.2.3).
# Real-time app: production uses PodDisruptionBudgets (minAvailable=2 for API)
# and maxUnavailable=0 rolling updates so active WebSocket connections are
# never severed during a deploy. The workflow waits for the rollout to
# complete before declaring success.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"        # v1.0.0, v2.3.1 etc.
      - "v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+" # v1.0.0-rc.1
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Exact image tag to deploy (must already exist in ECR)"
        required: true

env:
  AWS_REGION: us-east-1
  ECR_ACCOUNT: ${{ secrets.ECR_ACCOUNT_ID }}
  EKS_CLUSTER: datapilot-prod
  HELM_NAMESPACE: datapilot
  # Use the git tag as the image tag; fall back to manual input
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.ref_name }}

jobs:
  # ── 1. Build and push release images ─────────────────────────────────────
  build-release:
    name: Build Release Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - { name: api,       dockerfile: deploy/docker/Dockerfile.api }
          - { name: worker,    dockerfile: deploy/docker/Dockerfile.worker }
          - { name: analytics, dockerfile: deploy/docker/Dockerfile.analytics }
          - { name: frontend,  dockerfile: deploy/docker/Dockerfile.frontend }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/datapilot/${{ matrix.image.name }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/datapilot/${{ matrix.image.name }}:latest
          cache-from: type=gha,scope=${{ matrix.image.name }}-prod
          cache-to:   type=gha,mode=max,scope=${{ matrix.image.name }}-prod
          build-args: |
            VITE_API_URL=https://app.datapilot.ai/api
            VITE_WS_URL=https://app.datapilot.ai/ws

  # ── 2. Production database migrations ────────────────────────────────────
  migrate-production:
    name: Database Migrations (Production)
    runs-on: ubuntu-latest
    needs: build-release
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install alembic
        run: pip install alembic asyncpg

      - name: Run migrations (with auto-rollback on failure)
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "Running Alembic upgrade head..."
          alembic upgrade head
          echo "Migrations complete ✓"

  # ── 3. Production Helm deploy ─────────────────────────────────────────────
  deploy-production:
    name: Helm Deploy (Production)
    runs-on: ubuntu-latest
    needs: [build-release, migrate-production]
    environment:
      name: production
      url: https://app.datapilot.ai
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add qdrant  https://qdrant.github.io/qdrant-helm
          helm repo update
          helm dependency update deploy/helm/datapilot

      - name: Helm diff (preview changes before applying)
        run: |
          helm plugin install https://github.com/databus23/helm-diff --version 3.9.4 || true
          helm diff upgrade datapilot ./deploy/helm/datapilot \
            --namespace ${{ env.HELM_NAMESPACE }} \
            -f deploy/helm/datapilot/values.yaml \
            -f deploy/helm/datapilot/values.production.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set global.imageRegistry=${{ env.ECR_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com \
            2>/dev/null || echo "helm-diff not available — skipping diff"

      - name: Helm upgrade (production)
        run: |
          helm upgrade --install datapilot ./deploy/helm/datapilot \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --create-namespace \
            -f deploy/helm/datapilot/values.yaml \
            -f deploy/helm/datapilot/values.production.yaml \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --set global.imageRegistry=${{ env.ECR_ACCOUNT }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com \
            --set serviceAccount.roleArn=${{ secrets.PROD_IRSA_ROLE_ARN }} \
            --set ingress.tls.certArn=${{ secrets.PROD_ACM_CERT_ARN }} \
            --set externalServices.databaseUrl=${{ secrets.PROD_DATABASE_URL }} \
            --set externalServices.redisUrl=${{ secrets.PROD_REDIS_URL }} \
            --set externalServices.kafkaBootstrapServers=${{ secrets.PROD_KAFKA_BROKERS }} \
            --set externalServices.qdrantUrl=${{ secrets.PROD_QDRANT_URL }} \
            --set externalServices.s3BucketName=${{ secrets.PROD_S3_BUCKET }} \
            --atomic \
            --timeout 15m \
            --wait

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/datapilot-api \
            -n ${{ env.HELM_NAMESPACE }} \
            --timeout=300s
          echo "API rollout complete — active WebSocket connections preserved ✓"

      - name: Production smoke tests
        run: |
          # HTTP health
          curl -sf https://app.datapilot.ai/health | grep -q "ok" || exit 1

          # Ready endpoint (checks DB + Redis connections)
          curl -sf https://app.datapilot.ai/ready || exit 1

          echo "Production smoke tests passed ✓"

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.IMAGE_TAG }}
          name: "DataPilot ${{ env.IMAGE_TAG }}"
          body: |
            ## DataPilot ${{ env.IMAGE_TAG }}

            Deployed to production at https://app.datapilot.ai

            **Docker images**:
            - `datapilot/api:${{ env.IMAGE_TAG }}`
            - `datapilot/worker:${{ env.IMAGE_TAG }}`
            - `datapilot/analytics:${{ env.IMAGE_TAG }}`
            - `datapilot/frontend:${{ env.IMAGE_TAG }}`

            **Changes**: See [CHANGELOG](CHANGELOG.md)
          draft: false
          prerelease: ${{ contains(env.IMAGE_TAG, '-rc.') }}

      - name: Post deployment summary
        run: |
          echo "## Production Deployment ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://app.datapilot.ai" >> $GITHUB_STEP_SUMMARY
          echo "- **WebSocket**: wss://app.datapilot.ai/ws" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace**: ${{ env.HELM_NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image tag**: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY

  # ── 4. Notify on failure ──────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build-release, migrate-production, deploy-production]
    if: failure()
    steps:
      - name: Post failure to Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚨 Production deploy FAILED for ${{ env.IMAGE_TAG }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
