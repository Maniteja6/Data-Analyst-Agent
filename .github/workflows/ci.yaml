name: CI

# Runs on every PR and push to main/develop.
# Real-time app note: WebSocket streaming agents are tested via MockLLMService
# so no AWS credentials are needed in CI — all Bedrock calls are mocked.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # cancel stale runs when new commits are pushed

env:
  PYTHON_VERSION: "3.11"
  # Test environment — switches all adapters to in-memory equivalents
  APP_ENV: test
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"
  REDIS_URL: "memory://"
  MOCK_LLM: "true"
  S3_ENDPOINT_URL: local://
  FEATURE_KAFKA: "false"
  FEATURE_CLICKHOUSE: "false"
  FEATURE_RAG: "false"
  FEATURE_BEDROCK: "false"

jobs:
  # ── 1. Lint + type check (fast — runs in < 60s) ──────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install ruff==0.11.13 mypy types-redis types-openpyxl

      - name: Ruff lint
        run: ruff check backend/ --output-format=github

      - name: Ruff format check
        run: ruff format backend/ --check

      - name: Mypy type check
        env:
          MYPYPATH: .
        run: |
          mypy backend/ \
            --config-file backend/pyproject.toml \
            --explicit-package-bases \
            --ignore-missing-imports \
            --no-strict-optional \
            --exclude 'backend/tests/' \
            --no-error-summary
        continue-on-error: true   # type errors are warnings in CI for now

  # ── 2. Unit tests (no external services) ────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: |
          pytest backend/tests/unit/ \
            -m unit \
            -x \
            -v \
            --tb=short \
            --cov=backend \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=junit-unit.xml \
            -p no:warnings \
            --timeout=30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: junit-unit.xml

  # ── 3. Integration tests (DuckDB + LocalStorage — no external services) ──
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: datapilot_test
          POSTGRES_USER: datapilot
          POSTGRES_PASSWORD: datapilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datapilot"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://datapilot:datapilot@localhost:5432/datapilot_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic -c backend/alembic.ini upgrade head

      - name: Run integration tests
        run: |
          pytest backend/tests/integration/ \
            -m integration \
            -x \
            -v \
            --tb=short \
            --junitxml=junit-integration.xml \
            -p no:warnings \
            --timeout=120

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: junit-integration.xml

  # ── 4. Docker build check (validates Dockerfiles parse correctly) ────────
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - { file: deploy/docker/api.Dockerfile,      tag: datapilot/api }
          - { file: deploy/docker/worker.Dockerfile,   tag: datapilot/worker }
          - { file: deploy/docker/analytics.Dockerfile,tag: datapilot/analytics }
          - { file: deploy/docker/frontend.Dockerfile, tag: datapilot/frontend }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.dockerfile.tag }} (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile.file }}
          push: false
          tags: ${{ matrix.dockerfile.tag }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.dockerfile.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.dockerfile.tag }}

  # ── 5. Prompt template validation ───────────────────────────────────────
  prompt-validation:
    name: Prompt Template Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate all prompt templates have required variables
        run: |
          python3 - << 'EOF'
          import pathlib, re, sys

          REQUIRED_VARS = {
              "prompts/sql/v1.txt":            ["schema_summary", "user_question"],
              "prompts/intent/v1.txt":         ["column_names", "user_message"],
              "prompts/schema/v1.txt":         ["column_name", "sample_values"],
              "prompts/planner/v1.txt":        ["dataset_id", "schema_summary"],
              "prompts/insight/v1.txt":        ["row_count", "column_names"],
              "prompts/critic/v1.txt":         ["profile_summary", "insights_json"],
              "prompts/forecast/v1.txt":       ["target_column", "trend_direction"],
              "prompts/recommendation/v1.txt": ["insights_json", "anomaly_count"],
              "prompts/report/v1.txt":         ["executive_summary", "insights_json"],
              "prompts/python/v1.txt":         ["schema_summary", "task_description"],
              "prompts/validation/v1.txt":     ["response_text"],
              "prompts/orchestrator/v1.txt":   ["original_plan_json", "failed_tasks_json"],
          }

          errors = []
          for path, required in REQUIRED_VARS.items():
              p = pathlib.Path(path)
              if not p.exists():
                  errors.append(f"MISSING: {path}")
                  continue
              content = p.read_text()
              found   = re.findall(r'\{(\w+)\}', content)
              for var in required:
                  if var not in found:
                      errors.append(f"MISSING VAR '{var}' in {path}")

          if errors:
              print("Prompt validation FAILED:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)
          else:
              print(f"All {len(REQUIRED_VARS)} prompt templates validated ✓")
          EOF

  # ── Summary gate — all jobs must pass before merge ───────────────────────
  ci-passed:
    name: CI Passed
    needs: [lint, unit-tests, integration-tests, docker-build-check, prompt-validation]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.unit-tests.result }}" != "success" ||
                "${{ needs.integration-tests.result }}" != "success" ||
                "${{ needs.docker-build-check.result }}" != "success" ||
                "${{ needs.prompt-validation.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed ✓"
