# ===========================================================================
# Alembic configuration for DataPilot
# Run migrations: alembic upgrade head
# New migration:  alembic revision --autogenerate -m "description"
# ===========================================================================

[alembic]
script_location = backend/infrastructure/persistence/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
timezone = UTC

# Database URL — overridden at runtime by env.py reading DATABASE_URL from env
sqlalchemy.url = postgresql+asyncpg://datapilot:datapilot_dev_password@localhost:5432/datapilot

[post_write_hooks]
# Optionally run ruff on generated migration files
# hooks = ruff
# ruff.type = exec
# ruff.entrypoint = ruff
# ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
