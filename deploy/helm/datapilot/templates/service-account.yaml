{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "datapilot.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.roleArn }}
    # IRSA — binds this ServiceAccount to an IAM role via EKS OIDC.
    # Pods using this SA get AWS credentials via projected token — no
    # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars needed.
    # Required for: Bedrock InvokeModel, S3 GetObject/PutObject, MSK Connect.
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
    eks.amazonaws.com/token-expiration: {{ .Values.serviceAccount.tokenExpiration | toString | quote }}
    {{- end }}
automountServiceAccountToken: true
{{- end }}
