{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "datapilot.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels: {{- include "datapilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    # Trigger rolling restart when ConfigMap content changes
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels: {{- include "datapilot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      # Real-time: never take a pod down before the replacement is ready.
      # Active WebSocket connections would be severed if a pod disappears
      # before the new one is serving traffic.
      maxUnavailable: 0
  template:
    metadata:
      labels: {{- include "datapilot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      terminationGracePeriodSeconds: {{ .Values.api.terminationGracePeriodSeconds }}

      {{- if .Values.api.topologySpreadConstraints.enabled }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels: {{- include "datapilot.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: api
      {{- end }}

      containers:
        - name: api
          image: {{ include "datapilot.image" (dict "imageRoot" .Values.api.image "global" .Values.global "defaultTag" .Values.image.tag) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.api.command }}
          command: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          envFrom:
            - configMapRef:
                name: {{ include "datapilot.fullname" . }}-config
            - secretRef:
                name: {{ include "datapilot.fullname" . }}-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE),service.name={{ .Values.config.otel.serviceName }}"

          resources: {{- toYaml .Values.api.resources | nindent 12 }}

          readinessProbe: {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          livenessProbe:  {{- toYaml .Values.api.livenessProbe  | nindent 12 }}
          startupProbe:   {{- toYaml .Values.api.startupProbe   | nindent 12 }}

          securityContext: {{- toYaml .Values.api.securityContext | nindent 12 }}

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: prometheus-multiproc
              mountPath: /tmp/prometheus

      volumes:
        - name: tmp
          emptyDir: {}
        - name: prometheus-multiproc
          emptyDir: {}

      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets: {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "datapilot.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels: {{- include "datapilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector: {{- include "datapilot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: {{ .Values.api.service.targetPort }}
      protocol: TCP
  sessionAffinity: {{ .Values.api.service.sessionAffinity }}
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.api.service.sessionAffinityTimeout }}

---
{{- if .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "datapilot.fullname" . }}-api-pdb
  namespace: {{ .Release.Namespace }}
  labels: {{- include "datapilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels: {{- include "datapilot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
{{- end }}
{{- end }}
