version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.test.yml — DataPilot isolated test environment
#
# Usage:
#   # Run all tests
#   docker compose -f docker-compose.test.yml up --exit-code-from test-runner
#
#   # Run only unit tests (no external services needed)
#   docker compose -f docker-compose.test.yml run --rm test-runner \
#     pytest -m unit -x -v
#
#   # Run integration tests
#   docker compose -f docker-compose.test.yml run --rm test-runner \
#     pytest -m integration -x -v
#
# Test environment:
#   APP_ENV=test                 — switches adapters to in-memory/local
#   DATABASE_URL=sqlite+aiosqlite:///test.db — no Postgres needed for unit tests
#   REDIS_URL=memory://          — InMemoryCacheAdapter (no Redis for unit tests)
#   MockLLMService               — no Bedrock calls, deterministic responses
#   NullJobAdapter               — no Celery broker needed
#   LocalStorageAdapter          — no S3 needed
#
# Integration tests add:
#   postgres-test               — fresh DB, Alembic migrations applied before tests
#   redis-test                  — real Redis for cache/pub-sub integration tests
#
# Real-time test notes:
#   • Socket.IO events are tested by passing a MagicMock as AgentContext._sio
#   • WebSocket integration tests use python-socketio AsyncClient
#   • Streaming tests verify that insight:summary_token events are emitted
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Test runner ───────────────────────────────────────────────────────────
  test-runner:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
      target: production
    volumes:
      - ../../backend:/app/backend
      - ../../pytest.ini:/app/pytest.ini
      - test_results:/app/test-results
    environment:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://datapilot:datapilot@postgres-test:5432/datapilot_test
      REDIS_URL: redis://redis-test:6379/0
      MOCK_LLM: "true"
      S3_ENDPOINT_URL: "local://"
      FEATURE_KAFKA: "false"
      FEATURE_CLICKHOUSE: "false"
      FEATURE_RAG: "false"
      PYTHONPATH: /app
      PYTEST_ADDOPTS: >
        --tb=short
        --strict-markers
        -p no:warnings
        --junitxml=/app/test-results/junit.xml
        --cov=backend
        --cov-report=xml:/app/test-results/coverage.xml
        --cov-report=term-missing
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Running Alembic migrations ===' &&
        alembic upgrade head &&
        echo '=== Running test suite ===' &&
        pytest backend/tests/ -v
      "
    networks:
      - test

  # ── Isolated Postgres ─────────────────────────────────────────────────────
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datapilot_test
      POSTGRES_USER: datapilot
      POSTGRES_PASSWORD: datapilot
    tmpfs:
      - /var/lib/postgresql/data   # in-memory — fast, discarded after tests
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapilot -d datapilot_test"]
      interval: 3s
      timeout: 3s
      retries: 15
    networks:
      - test

  # ── Isolated Redis ────────────────────────────────────────────────────────
  redis-test:
    image: redis:7-alpine
    command: redis-server --save ""   # no persistence — in-memory only
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - test

volumes:
  test_results:

networks:
  test:
    driver: bridge