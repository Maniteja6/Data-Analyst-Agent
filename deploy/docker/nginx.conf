server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/wasm;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Asset caching ──────────────────────────────────────────────────────
    # Vite adds content hashes to asset filenames — safe to cache forever
    location ~* \.(js|css|woff2|woff|ttf|png|svg|ico|webp)$ {
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html — app must pick up new deployments immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ── Socket.IO WebSocket proxy ──────────────────────────────────────────
    # Socket.IO uses HTTP long-polling as a fallback transport.
    # Both /ws/socket.io (polling) and the WebSocket upgrade must be proxied.
    location /ws {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers — required for Socket.IO
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forwarding headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts: 1hr for long-lived WebSocket connections
        # (analysis pipeline can take up to 5 min; leave headroom)
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time streaming
        proxy_buffering    off;
        proxy_cache_bypass $http_upgrade;
    }

    # ── REST API proxy ─────────────────────────────────────────────────────
    location /api {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Allow large file uploads (CSV/XLSX/Parquet)
        client_max_body_size 500M;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────
    # All unknown paths return index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health probe ───────────────────────────────────────────────────────
    location = /health.txt {
        access_log off;
        add_header Content-Type text/plain;
    }
}