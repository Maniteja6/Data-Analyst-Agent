apiVersion: v1
kind: Service
metadata:
  name: datapilot-api
  namespace: datapilot
  labels:
    app.kubernetes.io/name: datapilot
    app.kubernetes.io/component: api
  annotations:
    # Real-time: ALB uses these annotations for WebSocket sticky sessions.
    # Without sticky sessions, a Socket.IO client that reconnects may land
    # on a different pod and lose its room subscriptions.
    # stickiness.enabled + duration=86400s keeps a client on the same pod
    # for 24 hours (Safari and mobile clients reconnect frequently).
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
spec:
  type: ClusterIP
  selector:
    app: datapilot-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  # SessionAffinity at the kube-proxy level as a fallback.
  # Primary sticky sessions are handled by the ALB target group (ingress.yaml).
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 86400
