apiVersion: v1
kind: Service
metadata:
  name: datapilot-frontend
  namespace: datapilot
  labels:
    app.kubernetes.io/name: datapilot
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app: datapilot-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
