apiVersion: v1
kind: ServiceAccount
metadata:
  name: datapilot-sa
  namespace: datapilot
  labels:
    app.kubernetes.io/name: datapilot
    app.kubernetes.io/component: iam
  annotations:
    # IRSA — binds this service account to an IAM role via OIDC.
    # The IAM role must trust the EKS OIDC provider and have the policy
    # in bedrock-access-policy.json attached.
    #
    # Replace <account-id> and <cluster-oidc-id> with your values:
    #   aws eks describe-cluster --name datapilot --query "cluster.identity.oidc.issuer"
    eks.amazonaws.com/role-arn: "arn:aws:iam::<account-id>:role/datapilot-eks-irsa-role"
    eks.amazonaws.com/token-expiration: "86400"  # 24h token rotation
automountServiceAccountToken: true
